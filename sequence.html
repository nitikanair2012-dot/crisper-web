<div id="bionichaos-module" style="
    width: 100%; 
    max-width: 1100px; 
    margin: 20px auto; 
    background: rgba(10, 15, 25, 0.8); 
    border: 1px solid #0099FF; 
    border-radius: 15px; 
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0, 153, 255, 0.2);
    font-family: 'Courier New', monospace;">
    
    <div style="background: rgba(0, 153, 255, 0.1); padding: 10px 20px; border-bottom: 1px solid #0099FF; display: flex; justify-content: space-between;">
        <span style="color: #0099FF; font-weight: bold; letter-spacing: 2px;">GENOMIC_SEQUENCE_INTERFACE // v2.0</span>
        <span id="status-light" style="color: #00FF00;">● SYSTEM_READY</span>
    </div>

    <div style="display: flex; flex-wrap: wrap; background: #050A15;">
        <div id="canvas-wrapper" style="flex: 2; min-width: 300px; position: relative; background: #000; cursor: crosshair;">
            <canvas id="crisprCanvas"></canvas>
        </div>

        <div style="flex: 1; min-width: 250px; padding: 20px; border-left: 1px solid rgba(0, 153, 255, 0.3); background: rgba(10, 15, 25, 0.5);">
            <h3 style="color: #0099FF; margin-top: 0; font-size: 18px;">REAL-TIME ANALYSIS</h3>
            <div id="log-display" style="height: 300px; overflow-y: auto; font-size: 13px; color: #E3F2FD; line-height: 1.6;">
                <div style="color: #0099FF;">> Initialize gRNA sequence...</div>
                <div style="color: #0099FF;">> Awaiting user input...</div>
            </div>
            
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(0, 153, 255, 0.3);">
                <div style="font-size: 11px; color: #64B5F6;">PROTEIN_STRUCTURE: CAS9_NUCLEASE</div>
                <div style="font-size: 11px; color: #64B5F6;">REPAIR_PATHWAY: <span id="pathway-id">PENDING</span></div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('crisprCanvas');
const ctx = canvas.getContext('2d');
const logDisplay = document.getElementById('log-display');
const pathwayId = document.getElementById('pathway-id');

const baseWidth = 1000, baseHeight = 700;
let scale = 1;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    const parent = canvas.parentElement;
    scale = Math.min(parent.clientWidth / baseWidth, 600 / baseHeight);
    canvas.width = baseWidth * dpr * scale;
    canvas.height = baseHeight * dpr * scale;
    canvas.style.width = (baseWidth * scale) + "px";
    canvas.style.height = (baseHeight * scale) + "px";
}
window.addEventListener('resize', resize);
resize();

const SCIENCE_LOG = {
  SCANNING: { title: 'PHASE: TARGETING', log: "Scanning for PAM sequences...", body: ['Locating target site...'] },
  BINDING: { title: 'PHASE: BINDING', log: "R-loop formed. DNA unwound.", body: ['Unwinding double helix...'] },
  CLEAVAGE: { title: 'PHASE: CLEAVAGE', log: "Double-strand break induced.", body: ['Cutting DNA strands...'] },
  FIXING: { title: 'PHASE: REPAIRING', log: "Recruiting cellular machinery.", body: ['Repairing break...'] },
  NHEJ: { title: 'RESULT: NHEJ', log: "Mutagenesis complete (Indel).", body: ['Random mutation achieved.'] },
  HDR: { title: 'RESULT: HDR', log: "Precision edit successful.", body: ['Template repair complete.'] }
};

let state = 'SCANNING', repair_choice = null, repair_progress = 0, 
    cas9_pos = 150, target_pos = 150, show_break = false;

function addLog(text) {
    const entry = document.createElement('div');
    entry.innerHTML = `<span style="color:#0099FF;">[${new Date().toLocaleTimeString([], {hour12:false})}]</span> ${text}`;
    logDisplay.prepend(entry);
}

function handleInput(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) / scale;
    const y = (clientY - rect.top) / scale;
    
    // Bottom Navigation Hitboxes
    if (y >= 630 && y <= 700) {
        if (x >= 40 && x < 170) { state = 'SCANNING'; show_break = false; repair_choice = null; addLog(SCIENCE_LOG.SCANNING.log); }
        else if (x >= 180 && x < 310) { state = 'BINDING'; addLog(SCIENCE_LOG.BINDING.log); }
        else if (x >= 320 && x <= 450) { state = 'CLEAVAGE'; show_break = true; addLog(SCIENCE_LOG.CLEAVAGE.log); }
    }
    
    // Repair Choice Hitboxes
    if (state === 'CLEAVAGE' && x > 640 && x < 960) {
        if (y > 390 && y < 460) { state = 'FIXING'; repair_choice = 'NHEJ'; pathwayId.innerText = 'NHEJ'; addLog(SCIENCE_LOG.FIXING.log); }
        if (y > 470 && y < 540) { state = 'FIXING'; repair_choice = 'HDR'; pathwayId.innerText = 'HDR'; addLog(SCIENCE_LOG.FIXING.log); }
    }
}

canvas.addEventListener('mousedown', e => handleInput(e.clientX, e.clientY));

function draw() {
    const dpr = window.devicePixelRatio || 1;
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
    ctx.clearRect(0,0,baseWidth, baseHeight);
    
    const time = Date.now() * 0.003;

    // DNA Helix
    for (let i=0; i<16; i++) {
        const y = 120 + i*35;
        const rot = time + (i * 0.5);
        const depth = Math.sin(rot);
        const perspective = 0.7 + (depth + 1) * 0.15;
        const x1 = Math.sin(time + i*0.5) * 40 * perspective;
        const x2 = Math.sin(time + i*0.5 + Math.PI) * 40 * perspective;
        const gap = (show_break && i > 6 && i < 10) ? (state === 'FIXING' ? 40 - repair_progress*0.4 : 40) : 0;

        ctx.strokeStyle = depth > 0 ? '#0099FF' : 'rgba(0,153,255,0.2)';
        ctx.lineWidth = 3;
        if (!(show_break && gap > 5)) {
            ctx.beginPath(); ctx.moveTo(500 + x1 - gap, y); ctx.lineTo(500 + x2 + gap, y); ctx.stroke();
        }
        ctx.fillStyle = depth > 0 ? '#FFF' : 'rgba(255,255,255,0.2)';
        ctx.beginPath(); ctx.arc(500 + x1 - gap, y, 6*perspective, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(500 + x2 + gap, y, 6*perspective, 0, Math.PI*2); ctx.fill();
    }

    // Logic
    if (state === 'SCANNING') {
        if (Math.random() < 0.02) target_pos = 150 + Math.random()*300;
        cas9_pos += (target_pos - cas9_pos) * 0.05;
    } else if (state === 'FIXING') {
        repair_progress += 1;
        if (repair_progress >= 100) { show_break = false; state = repair_choice; addLog(SCIENCE_LOG[repair_choice].log); }
    } else { cas9_pos += (300 - cas9_pos) * 0.1; }

    // Cas9
    ctx.save();
    ctx.translate(440, cas9_pos);
    ctx.fillStyle = 'rgba(255, 215, 0, 0.7)';
    ctx.beginPath(); ctx.arc(60, 60, 45, 0, Math.PI*2); ctx.fill();
    if (state !== 'SCANNING') {
        const spin = Math.sin(time*5)*8;
        ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(50+spin, 40); ctx.lineTo(50-spin, 80); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(70-spin, 40); ctx.lineTo(70+spin, 80); ctx.stroke();
    }
    ctx.fillStyle = '#FFF'; ctx.font = '16px Arial'; ctx.fillText('Cas9 Protein', 10, -10);
    ctx.restore();

    // UI Buttons
    if (state === 'CLEAVAGE') {
        [['TRIGGER NHEJ', 400], ['TRIGGER HDR', 480]].forEach(([txt, y]) => {
            ctx.fillStyle = 'rgba(21, 101, 192, 0.8)'; ctx.strokeStyle = '#FFF';
            ctx.beginPath(); ctx.roundRect(650, y, 300, 55, 8); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#FFF'; ctx.font = 'bold 14px "Courier New"'; ctx.fillText(txt, 675, y+35);
        });
    }

    [['SCAN', 50], ['BIND', 190], ['CUT', 330]].forEach(([l, x]) => {
        ctx.fillStyle = '#1565C0'; ctx.strokeStyle = '#FFF';
        ctx.beginPath(); ctx.roundRect(x, 640, 120, 45, 8); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 13px "Courier New"'; ctx.fillText(l, x+22, 668);
    });

    requestAnimationFrame(draw);
}
draw();
</script>
